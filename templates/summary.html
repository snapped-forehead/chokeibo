<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2c3e50">
<title>集計</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  min-height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: #1a2332;
  color: #fff;
}
#app { display: flex; flex-direction: column; min-height: 100dvh; max-width: 700px; margin: 0 auto; }

#header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: #2c3e50;
  border-bottom: 1px solid #3d5166;
  flex-shrink: 0;
}
#back-btn {
  font-size: 13px;
  color: #5dade2;
  border: 1px solid #5dade2;
  background: transparent;
  border-radius: 10px;
  padding: 4px 10px;
  cursor: pointer;
  text-decoration: none;
}
#header h1 { font-size: 16px; font-weight: bold; flex: 1; }

#content { flex: 1; padding: 12px 10px 24px; }

#loading-msg, #empty-msg {
  text-align: center;
  color: #5d6d7e;
  padding: 40px 0;
  font-size: 14px;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid #fff3;
  border-top-color: #5dade2;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* テーブル */
#table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border-radius: 10px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 320px;
}
thead th {
  background: #2c3e50;
  color: #aab;
}
thead th.highlight-head {
  color: #5dade2;
  font-size: 11px;
  font-weight: bold;
  padding: 8px 10px;
  text-align: right;
  white-space: nowrap;
  border-bottom: 2px solid #3d5166;
}
thead th:first-child { text-align: left; }

tbody tr { border-bottom: 1px solid #253447; }
tbody tr:last-child { border-bottom: none; }
tbody tr.highlight { background: #2c3e50; }

tbody td {
  padding: 10px 10px;
  text-align: right;
  white-space: nowrap;
  color: #c8d6e5;
}
tbody td:first-child {
  text-align: left;
  color: #fff;
  font-weight: bold;
  font-size: 13px;
}
tbody td.zero { color: #3d5166; }
tbody td.total-col {
  color: #f0f4f8;
  font-weight: bold;
  border-left: 1px solid #3d5166;
}
tfoot td {
  background: #253447;
  padding: 8px 10px;
  text-align: right;
  font-weight: bold;
  color: #f0f4f8;
  font-size: 13px;
  border-top: 2px solid #3d5166;
  white-space: nowrap;
}
tfoot td:first-child { text-align: left; color: #aab; }
tfoot td.grand-total { color: #5dade2; font-size: 14px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <a href="/" id="back-btn">← 入力</a>
    <h1>集計</h1>
  </div>
  <div id="content">
    <div id="loading-msg"><div class="spinner"></div>読み込み中...</div>
    <div id="empty-msg" style="display:none">データがありません</div>
    <div id="table-wrap" style="display:none">
      <table id="summary-table">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>
  </div>
</div>
<script>
const PERIODS = ['当日','昨日','今週','先週','今月','先月','今年'];
// 今日が含まれる期間を太字表示
const TODAY_PERIODS = new Set(['当日','今週','今月','今年']);

async function loadData() {
  try {
    const res = await fetch('/api/summary');
    const json = await res.json();
    if (json.success) renderTable(json.data);
    else document.getElementById('loading-msg').textContent = 'エラー: ' + json.message;
  } catch(e) {
    document.getElementById('loading-msg').textContent = '通信エラーが発生しました';
  }
}

function fmt(n) {
  return n > 0 ? '¥' + n.toLocaleString('ja-JP') : '-';
}

function renderTable(data) {
  document.getElementById('loading-msg').style.display = 'none';

  // 全科目を収集（出現順を維持）
  const catSet = new Set();
  for (const period of PERIODS) {
    for (const cat of Object.keys(data[period] || {})) catSet.add(cat);
  }
  const cats = [...catSet];

  if (cats.length === 0) {
    document.getElementById('empty-msg').style.display = 'block';
    return;
  }

  document.getElementById('table-wrap').style.display = 'block';

  // thead：列 = 期間
  const thead = document.getElementById('thead');
  thead.innerHTML = '<tr>'
    + '<th>科目</th>'
    + PERIODS.map(p => {
        const cls = TODAY_PERIODS.has(p) ? ' class="highlight-head"' : '';
        return `<th${cls}>${p}</th>`;
      }).join('')
    + '</tr>';

  // tbody：行 = 科目
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = cats.map(cat => {
    return '<tr>'
      + `<td>${cat}</td>`
      + PERIODS.map(p => {
          const v = (data[p] || {})[cat] || 0;
          return `<td class="${v === 0 ? 'zero' : ''}">${fmt(v)}</td>`;
        }).join('')
      + '</tr>';
  }).join('');

  // tfoot：期間ごとの合計行
  const tfoot = document.getElementById('tfoot');
  const periodTotals = PERIODS.map(p => cats.reduce((s, c) => s + ((data[p] || {})[c] || 0), 0));
  tfoot.innerHTML = '<tr>'
    + '<td>合計</td>'
    + periodTotals.map((v, i) => {
        const cls = TODAY_PERIODS.has(PERIODS[i]) ? ' class="grand-total"' : '';
        return `<td${cls}>${fmt(v)}</td>`;
      }).join('')
    + '</tr>';
}

loadData();
</script>
</body>
</html>
